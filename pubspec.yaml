name: wenzagent
description: Pure Dart library for LAN communication, RPC, and Agent management.
version: 1.0.0
repository: https://github.com/lyming99/wenzagent
homepage: https://github.com/lyming99/wenzagent
issue_tracker: https://github.com/lyming99/wenzagent/issues
topics:
  - agent
  - llm
  - lan
  - rpc
  - ai
  - mcp

license: Apache-2.0

environment:
  sdk: ^3.11.0

dependencies:
  uuid: ^4.5.1
  shelf: ^1.4.0
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^3.0.1
  crypto: ^3.0.6
  path: ^1.9.0
  yaml: ^3.1.2
  meta: ^1.12.0
  # SQLite for local storage (纯 Dart FFI，异步不阻塞)
  sqlite3: ^2.4.6
  # LLM unified interface
  llm_dart:
#    path: D:/project/GitHub/llm_dart
    git:
      url: https://github.com/Latias94/llm_dart.git
  dio: ^5.9.0
  # MCP SDK
  mcp_dart: ^2.1.0
  # Mutex / synchronized lock
  synchronized: ^3.4.0
  # ZIP archive
  archive: ^4.0.4

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6

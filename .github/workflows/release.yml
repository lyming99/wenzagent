name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 ──
          - platform: windows-x64
            os: windows-latest
            exe-suffix: .exe
          # ── Linux x64 ──
          - platform: linux-x64
            os: ubuntu-latest
            exe-suffix: ""
          # ── macOS x64 ──
          - platform: macos-x64
            os: macos-13          # macOS 13 提供 Intel (x64) runner
            exe-suffix: ""
          # ── macOS ARM64 (Apple Silicon) ──
          - platform: macos-arm64
            os: macos-latest      # macOS 14+ runner 原生 ARM64
            exe-suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Compile server
        run: dart compile exe bin/wenzagent_server.dart -o build/wenzagent_server${{ matrix.exe-suffix }}

      - name: Compile client
        run: dart compile exe bin/wenzagent_client.dart -o build/wenzagent_client${{ matrix.exe-suffix }}

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path build/wenzagent_server.exe -DestinationPath dist/wenzagent_server-${{ matrix.platform }}.zip
          Compress-Archive -Path build/wenzagent_client.exe -DestinationPath dist/wenzagent_client-${{ matrix.platform }}.zip

      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar czf dist/wenzagent_server-${{ matrix.platform }}.tar.gz -C build wenzagent_server
          tar czf dist/wenzagent_client-${{ matrix.platform }}.tar.gz -C build wenzagent_client

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wenzagent-${{ matrix.platform }}
          path: dist/*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
